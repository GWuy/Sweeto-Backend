        - addForeignKeyConstraint:
            constraintName: fk_role_permissions_role
            baseTableName: role_permissions
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: role_id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_role_permissions_permission
            baseTableName: role_permissions
            baseColumnNames: permission_id
            referencedTableName: permissions
            referencedColumnNames: permission_id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_role_permissions_granted_by
            baseTableName: role_permissions
            baseColumnNames: granted_by_account_id
            referencedTableName: accounts
            referencedColumnNames: account_id

        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: refresh_token_id
                  type: VARCHAR(20)
                  constraints:
                    primaryKey: true
              - column:
                  name: account_id
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
