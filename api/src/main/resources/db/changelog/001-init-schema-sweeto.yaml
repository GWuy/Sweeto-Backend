databaseChangeLog:
  - changeSet:
      id: 001-init-schema-sweeto
      author: sweeto
      changes:
        - sql:
            sql: |
              CREATE SCHEMA IF NOT EXISTS sweeto;
              SET search_path TO sweeto;

        # =====================================================
        # AUTHENTICATION / ACCESS CONTROL
        # =====================================================

        - createTable:
            tableName: account_status
            columns:
              - column:
                  name: account_status_id
                  type: VARCHAR(20)
                  constraints:
                    primaryKey: true
              - column:
                  name: status_code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: status_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT

        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: account_id
                  type: VARCHAR(20)
                  constraints:
                    primaryKey: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email_verified
                  type: BOOLEAN
                  defaultValue: false
                  constraints:
                    nullable: false
              - column:
                  name: account_status_id
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: last_login_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueDate: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueDate: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_accounts_status
            baseTableName: accounts
            baseColumnNames: account_status_id
            referencedTableName: account_status
            referencedColumnNames: account_status_id

        - createTable:
            tableName: roles
            columns:
              - column:
                  name: role_id
                  type: VARCHAR(20)
                  constraints:
                    primaryKey: true
              - column:
                  name: role_code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: role_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueDate: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: permissions
            columns:
              - column:
                  name: permission_id
                  type: VARCHAR(20)
                  constraints:
                    primaryKey: true
              - column:
                  name: permission_code
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: permission_name
                  type: VARCHAR(150)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueDate: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createTable:
            tableName: account_roles
            columns:
              - column:
                  name: account_role_id
                  type: VARCHAR(20)
                  constraints:
                    primaryKey: true
              - column:
                  name: account_id
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: assigned_at
                  type: TIMESTAMP
                  defaultValueDate: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: assigned_by_account_id
                  type: VARCHAR(20)
            uniqueConstraints:
              - columnNames: account_id,role_id
                constraintName: uq_account_roles_account_role

        - addForeignKeyConstraint:
            constraintName: fk_account_roles_account
            baseTableName: account_roles
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: account_id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_account_roles_role
            baseTableName: account_roles
            baseColumnNames: role_id
            referencedTableName: roles
            referencedColumnNames: role_id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_account_roles_assigned_by
            baseTableName: account_roles
            baseColumnNames: assigned_by_account_id
            referencedTableName: accounts
            referencedColumnNames: account_id

        - createTable:
            tableName: role_permissions
            columns:
              - column:
                  name: role_permission_id
                  type: VARCHAR(20)
                  constraints:
                    primaryKey: true
              - column:
                  name: role_id
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: permission_id
